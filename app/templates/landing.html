{% extends "base.html" %}
{% block title %}TaskMaster - Smart Task Management{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto text-center py-20">
    <h1 class="text-5xl font-bold text-gray-900 mb-4">TaskMaster</h1>
    <p class="text-xl text-gray-600 mb-8">AI-powered task management for teams and individuals.</p>
    <div class="space-x-4">
        <a href="{{ url_for('auth.login') }}" class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Login</a>
        <a href="{{ url_for('auth.register') }}" class="inline-block px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">Register</a>
    </div>
</div>
{% endblock %}
